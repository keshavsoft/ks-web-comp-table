<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Custom Element Test Bed</title>

</head>

<body class="min-h-full flex flex-col justify-between">

    <!-- <script src="../../Public/v2.6/KSTableComponents.js"></script> -->
    <script src="../../bin/components/v2/commands/header/template/v6/index.js" type="module"></script>

    <div>
        <h3>Web Component Testing (ks-table-footer-input-core)</h3>

        <!-- Static usage -->
        <!-- <ks-table-footer-input-core name="staticInput" placeholder="Static Input..."></ks-table-footer-input-core> -->
    </div>

    <script>
        // Dynamic usage: Create, configure, and append to body
        const elementName = "ks-table-footer-input";

        const Qty = () => {
            const dynamicInput = document.createElement(elementName);

            dynamicInput.setAttribute("name", "Qty");
            dynamicInput.setAttribute("placeholder", "Qty");
            dynamicInput.setAttribute("type", "number");
            // dynamicInput.setAttribute("onKeyDownType", "Qty");
            dynamicInput.setAttribute("enterAsTab", true);
            dynamicInput.setAttribute("evalformula", "OrigRate * Qty");

            document.body.appendChild(dynamicInput);
        };

        const OrigRate = () => {
            const value = "OrigRate";
            const dynamicInput = document.createElement(elementName);

            dynamicInput.setAttribute("name", value);
            dynamicInput.setAttribute("placeholder", value);
            dynamicInput.setAttribute("type", value);
            dynamicInput.setAttribute("onKeyDownType", value);
            dynamicInput.setAttribute("evalformula", "OrigRate * Qty");
            dynamicInput.setAttribute("evalToControl", "OrigAmount");

            document.body.appendChild(dynamicInput);
        };

        const OrigAmount = () => {
            const value = "OrigAmount";
            const dynamicInput = document.createElement(elementName);

            dynamicInput.setAttribute("name", value);
            dynamicInput.setAttribute("placeholder", value);
            dynamicInput.setAttribute("type", value);
            dynamicInput.setAttribute("onKeyDownType", value);
            dynamicInput.setAttribute("evalformula", "OrigAmount / Qty");
            dynamicInput.setAttribute("evalToControl", "OrigRate");

            document.body.appendChild(dynamicInput);
        };

        const RateInc = () => {
            const value = "RateInc";
            const dynamicInput = document.createElement(elementName);

            dynamicInput.setAttribute("name", value);
            dynamicInput.setAttribute("placeholder", value);
            dynamicInput.setAttribute("type", value);
            dynamicInput.setAttribute("onKeyDownType", value);
            dynamicInput.setAttribute("evalformula", "RateInc * Qty");
            dynamicInput.setAttribute("evalToControl", "Amount");

            document.body.appendChild(dynamicInput);
        };

        const Amount = () => {
            const value = "Amount";
            const dynamicInput = document.createElement(elementName);

            dynamicInput.setAttribute("name", value);
            dynamicInput.setAttribute("placeholder", value);
            dynamicInput.setAttribute("type", value);
            dynamicInput.setAttribute("onKeyDownType", value);
            dynamicInput.setAttribute("evalformula", "Amount / Qty");
            dynamicInput.setAttribute("evalToControl", "RateInc");

            document.body.appendChild(dynamicInput);
        };

        Qty();
        OrigRate();
        OrigAmount();
        RateInc();
        Amount();
        // const defaultOptions = customElements.get("ks-table-footer-input-core");
        // console.log("defaultOptions : ", defaultOptions.defaultOptions);

    </script>
</body>

</html>
