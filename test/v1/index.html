<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Custom Element Test Bed</title>

</head>

<body class="min-h-full flex flex-col justify-between">

    <script src="../../Public/v2.6/KSTableComponents.js"></script>

    <div>
        <h3>Web Component Testing (ks-table-footer-input-core)</h3>

        <!-- Static usage -->
        <ks-table-footer-input-core name="staticInput" placeholder="Static Input..."></ks-table-footer-input-core>
    </div>

    <script>
        // Dynamic usage: Create, configure, and append to body
        const dynamicInput = document.createElement("ks-table-footer-input-core");
        dynamicInput.setAttribute("name", "dynamicInput");
        dynamicInput.setAttribute("placeholder", "Dynamic Input...");
        document.body.appendChild(dynamicInput);
    </script>
</body>

</html>
